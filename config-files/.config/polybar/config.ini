[colors]
background = #282A2E
background-alt = #373B41
foreground = #C5C8C6
primary = #F0C674
secondary = #8ABEB7
alert = #A54242
disabled = #707880

[bar/toph]
bottom = false 
width = 100%
height = 40
radius = 6

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt
border-size = 4pt
border-color = #00000000

padding-left = 1
padding-right = 1
module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = Hack Nerd Font:size=22

modules-left = xworkspaces xwindow
modules-center = 
modules-right = pulseaudio gpu_temp memory cpu eth date 

enable-ipc = true

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline = ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/gpu_temp]
type = custom/script
exec = nvidia-smi --query-gpu=temperature.gpu --format=csv,noheader,nounits | awk '{print "%{F#F0C674}GPU%{F-} " $1 "°C"}'
interval = 5

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <label-volume>
label-volume = VOL %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage%%

[module/wlan]
type = internal/network
interface-type = wireless
label-connected = W: %essid% %local_ip%
label-disconnected = W: disconnected

[module/eth]
type = internal/network
interface-type = wired
label-connected =  %local_ip%
label-disconnected = E: disconnected

; [module/date]
; type = internal/date
; interval = 1
; date = %Y-%m-%d %H:%M:%S
; label = %date%
; label-foreground = ${colors.primary}

[module/date]
type = internal/date
interval = 1
date = %Y-%m-%d %{F#FFFFFF}|%{F#F0C674} %H:%M:%S%{F-}
label = %{F#F0C674}Date:%{F-} %date%

[settings]
screenchange-reload = true
pseudo-transparency = true

